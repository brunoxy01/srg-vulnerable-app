name: Build, Deploy & SRG Security Gate

# ──────────────────────────────────────────────────────────────────────────────
# Arquitetura — 100% cloud, sem servidor fixo, sem self-hosted runner:
#
#   [ubuntu-latest]          [ubuntu-latest]              [Dynatrace]
#   job: build ──────────►  job: security-gate  ────────► SRG Guardian
#   (build + push GHCR)      ① instala OneAgent             avalia CVEs
#                            ② docker compose up            → bloqueia se
#                            ③ aguarda AppSec (~5min)         vulnerável
#                            ④ dispara SRG workflow
#                            ⑤ lê resultado → exit 1 = BLOQUEADO
#                            ⑥ para stack (cleanup)
#
# O runner ubuntu-latest é uma VM Linux completa — o OneAgent é instalado
# nela durante o pipeline, monitora o processo Node.js em tempo real e o
# Application Security detecta os CVEs dos pacotes vulneráveis.
#
# Secrets necessários (apenas 6 — sem SSH, sem servidor fixo):
#   DOCKER_USERNAME     seu username do GitHub (ex: brunoxy01)
#   DOCKER_PASSWORD     GitHub PAT com escopo write:packages
#   DT_API_TOKEN        token clássico Dynatrace com escopo InstallerDownload
#   DT_CLIENT_ID        OAuth2 client ID do Dynatrace
#   DT_CLIENT_SECRET    OAuth2 client secret do Dynatrace
#   DT_WORKFLOW_ID      ID do Workflow criado por setup_dynatrace.sh
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */5 * * *'   # executa a cada 5 horas
  workflow_dispatch:

env:
  REGISTRY:      ghcr.io
  IMAGE_NAME:    ghcr.io/brunoxy01/srg-vulnerable-app
  DT_TENANT_URL: https://fov31014.apps.dynatrace.com

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build & Push ───────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      version:   ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── 2. Rodar app + OneAgent + SRG Gate (tudo no ubuntu-latest) ───────────
  #
  # O runner ubuntu-latest é uma VM Linux completa.
  # Instalamos o Dynatrace OneAgent nela, subimos o app via docker compose,
  # aguardamos o Application Security detectar os CVEs (~8 min) e disparamos
  # a validação SRG. Sem servidor fixo, sem SSH, sem self-hosted runner.
  security-gate:
    name: Deploy, Scan & SRG Gate
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    env:
      DT_TENANT_URL: https://fov31014.apps.dynatrace.com
      APP_VERSION:   ${{ needs.build.outputs.version }}
      BUILD_NUMBER:  ${{ github.run_number }}
      GIT_COMMIT:    ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── ① Instalar Dynatrace OneAgent no runner ───────────────────────────
      # Requer DT_API_TOKEN com escopo InstallerDownload.
      # Dynatrace → Access tokens → Generate new token → InstallerDownload
      # Continue-on-error: o pipeline NÃO para se o OneAgent falhar.
      # Nesse caso a validação SRG avalia as vulns já conhecidas na tenant.
      - name: Instalar Dynatrace OneAgent
        continue-on-error: true
        env:
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
        run: |
          if [ -z "${DT_API_TOKEN}" ]; then
            echo "⚠️  DT_API_TOKEN não configurado — OneAgent não será instalado"
            echo "    Adicione o secret DT_API_TOKEN com escopo InstallerDownload"
            exit 0
          fi

          echo "⬇️  Baixando OneAgent installer..."
          # OneAgent usa o domínio .live.dynatrace.com (não .apps.dynatrace.com)
          DT_LIVE_URL=$(echo "${DT_TENANT_URL}" | sed 's/\.apps\.dynatrace\.com/.live.dynatrace.com/')
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/Dynatrace-OneAgent.sh \
            "${DT_LIVE_URL}/api/v1/deployment/installer/agent/unix/default/latest?Api-Token=${DT_API_TOKEN}&arch=x86&flavor=default")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️  Download falhou (HTTP $HTTP_CODE) — verifique DT_API_TOKEN e escopo InstallerDownload"
            exit 0
          fi

          # Verifica se é um script válido (não uma mensagem de erro JSON)
          if ! head -1 /tmp/Dynatrace-OneAgent.sh | grep -q "^#!/"; then
            echo "⚠️  Resposta inválida — token pode não ter escopo InstallerDownload"
            head -c 200 /tmp/Dynatrace-OneAgent.sh
            exit 0
          fi

          echo "📦 Instalando OneAgent..."
          sudo /bin/sh /tmp/Dynatrace-OneAgent.sh \
            --set-infra-only=false \
            --set-app-log-content-access=true \
            --set-host-group=github-actions-runner \
            INSTALL_PATH=/opt/dynatrace && echo "✅ OneAgent instalado" \
            || echo "⚠️  Instalação do OneAgent falhou — pipeline continua sem instrumentação"

          sudo systemctl status dynatrace-oneagent --no-pager 2>/dev/null || true

      # ── ② Subir MySQL e a aplicação vulnerável ────────────────────────────
      # MySQL roda no Docker. A app Node.js roda DIRETAMENTE no host para
      # que o OneAgent possa instrumentar o processo e detectar os CVEs
      # dos pacotes npm em runtime (AppSec Runtime Vulnerability Detection).
      - name: Subir MySQL (docker)
        run: |
          docker run -d \
            --name srg-mysql \
            -e MYSQL_ROOT_PASSWORD=rootpassword \
            -e MYSQL_DATABASE=vulndb \
            -p 3306:3306 \
            mysql:8.0
          echo "✅ MySQL iniciado"

      - name: Aguardar MySQL ficar pronto
        run: |
          echo "⏳ Aguardando MySQL aceitar conexões..."
          for i in $(seq 1 30); do
            if docker exec srg-mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
              echo "✅ MySQL pronto"
              break
            fi
            echo "   Tentativa $i/30..."
            sleep 3
          done

      - name: Inicializar banco de dados
        run: |
          docker exec -i srg-mysql mysql -uroot -prootpassword vulndb < init.sql
          echo "✅ Banco inicializado"

      - name: Instalar dependências e iniciar app Node.js no host
        run: |
          cd app
          npm install --legacy-peer-deps --omit=dev
          echo "✅ Dependências instaladas"
          echo ""
          echo "🚀 Iniciando app Node.js no host (PID visível ao OneAgent)..."
          DB_HOST=127.0.0.1 DB_USER=root DB_PASSWORD=rootpassword DB_NAME=vulndb \
            PORT=3000 NODE_ENV=production \
            node server.js &
          APP_PID=$!
          echo "$APP_PID" > /tmp/app_pid.txt
          echo "✅ App iniciada (PID: $APP_PID)"

      - name: Aguardar health check
        run: |
          echo "⏳ Aguardando aplicação responder em /health ..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health; then
              echo ""
              echo "✅ Aplicação saudável"
              exit 0
            fi
            echo "   Tentativa $i/20 — aguardando 5s..."
            sleep 5
          done
          echo "❌ Aplicação não ficou saudável a tempo"
          exit 1

      # ── ②b Aquecer endpoints para forçar carregamento dos módulos ────────
      - name: Aquecer endpoints vulneráveis
        run: |
          echo "🔥 Chamando endpoints para forçar carregamento dos módulos..."
          curl -sf http://localhost:3000/ > /dev/null 2>&1 || true
          curl -sf http://localhost:3000/login > /dev/null 2>&1 || true
          curl -sf http://localhost:3000/search?q=test > /dev/null 2>&1 || true
          curl -sf http://localhost:3000/ping?host=localhost > /dev/null 2>&1 || true
          curl -sf http://localhost:3000/api/fetch?url=http://localhost:3000/health > /dev/null 2>&1 || true
          curl -sf http://localhost:3000/api/file?name=test > /dev/null 2>&1 || true
          curl -sf -X POST http://localhost:3000/api/merge -H 'Content-Type: application/json' -d '{"key": "value"}' > /dev/null 2>&1 || true
          curl -sf -X POST http://localhost:3000/api/profile -H 'Content-Type: application/json' -d '{"profile": "{\\"name\\":\\"test\\"}"}' > /dev/null 2>&1 || true
          echo "✅ Todos endpoints chamados"

      # ── ③ Aguardar AppSec detectar vulnerabilidades e listar nos logs ────
      # OneAgent precisa de tempo para instrumentar o processo Node.js,
      # detectar os pacotes vulneráveis em runtime e enviar à tenant.
      # Este step consulta a API via DQL para confirmar detecção e listar CVEs.
      - name: Aguardar e verificar vulnerabilidades detectadas
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
          DT_TENANT_URL:    https://fov31014.apps.dynatrace.com
        run: |
          echo "⏳ Aguardando Application Security detectar vulnerabilidades..."
          echo "   Pacotes vulneráveis carregados em runtime:"
          echo "     node-serialize@0.0.4 (CVE-2017-5941), ejs@3.1.6 (CVE-2022-29078)"
          echo "     lodash@4.17.15 (CVE-2020-8203), axios@0.21.1 (CVE-2021-3749)"
          echo ""

          # Função para obter token OAuth
          get_token() {
            curl -s -X POST "https://sso.dynatrace.com/sso/oauth2/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=client_credentials&client_id=${DT_CLIENT_ID}&client_secret=${DT_CLIENT_SECRET}&scope=storage:events:read storage:buckets:read" \
              | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4
          }

          # Função para consultar vulnerabilidades via DQL
          query_vulns() {
            local token="$1"
            curl -s -X POST "${DT_TENANT_URL}/platform/storage/query/v1/query:execute" \
              -H "Authorization: Bearer $token" \
              -H "Content-Type: application/json" \
              -d '{
                "query": "fetch security.events | dedup {vulnerability.display_id} | filter vulnerability.resolution.status == \"OPEN\" AND vulnerability.parent.mute.status != \"MUTED\" AND vulnerability.mute.status != \"MUTED\" AND vulnerability.risk.level in (\"CRITICAL\", \"HIGH\") | fields vulnerability.display_id, vulnerability.title, vulnerability.risk.level, vulnerability.risk.score | sort vulnerability.risk.score desc | limit 20",
                "defaultTimeframeStart": "now()-2h",
                "defaultTimeframeEnd": "now()"
              }' 2>/dev/null
          }

          # Espera inicial de 3 minutos para o OneAgent instrumentar
          echo "   Janela de espera inicial: 3 minutos"
          sleep 180

          echo ""
          echo "🔥 Segundo aquecimento dos endpoints..."
          curl -sf http://localhost:3000/ > /dev/null 2>&1 || true
          curl -sf http://localhost:3000/login > /dev/null 2>&1 || true
          curl -sf http://localhost:3000/search?q=warmup > /dev/null 2>&1 || true
          curl -sf -X POST http://localhost:3000/api/merge -H 'Content-Type: application/json' -d '{"a": 1}' > /dev/null 2>&1 || true
          curl -sf -X POST http://localhost:3000/api/profile -H 'Content-Type: application/json' -d '{"profile": "{\\"name\\":\\"test\\"}"}' > /dev/null 2>&1 || true
          echo "✅ Endpoints aquecidos"
          echo ""

          # Polling: consultar DQL a cada 60s por até 10 minutos
          MAX_POLL=600
          POLL_WAIT=60
          ELAPSED=0
          VULN_COUNT=0

          while [ $ELAPSED -lt $MAX_POLL ]; do
            TOKEN=$(get_token)
            if [ -z "$TOKEN" ]; then
              echo "   ⚠️  Não conseguiu token para consulta DQL (tentando novamente...)"
              sleep $POLL_WAIT
              ELAPSED=$((ELAPSED + POLL_WAIT))
              continue
            fi

            RESULT=$(query_vulns "$TOKEN")
            # Conta registros retornados
            VULN_COUNT=$(echo "$RESULT" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              records = data.get('result', {}).get('records', [])
              print(len(records))
          except:
              print(0)
          " 2>/dev/null || echo "0")

            echo "   🔍 Verificação (${ELAPSED}s): ${VULN_COUNT} vulnerabilidades HIGH/CRITICAL detectadas"

            if [ "$VULN_COUNT" -gt 0 ] 2>/dev/null; then
              echo ""
              echo "╔════════════════════════════════════════════════════════╗"
              echo "║   🛡️  VULNERABILIDADES DETECTADAS PELO DYNATRACE      ║"
              echo "╚════════════════════════════════════════════════════════╝"
              echo ""

              # Extrair e mostrar cada vulnerabilidade
              echo "$RESULT" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              records = data.get('result', {}).get('records', [])
              for r in records:
                  vid = r.get('vulnerability.display_id', 'N/A')
                  title = r.get('vulnerability.title', 'N/A')
                  level = r.get('vulnerability.risk.level', 'N/A')
                  score = r.get('vulnerability.risk.score', 'N/A')
                  print(f'  ❌ [{level}] {title}')
                  print(f'     ID: {vid} | Davis Security Score: {score}')
                  print()
          except Exception as e:
              print(f'  (detalhes indisponíveis: {e})')
          " 2>/dev/null

              echo ""
              echo "✅ ${VULN_COUNT} vulnerabilidades confirmadas — prosseguindo para validação SRG"
              echo "$VULN_COUNT" > /tmp/detected_vuln_count.txt
              echo "$RESULT" > /tmp/detected_vulns.json
              break
            fi

            sleep $POLL_WAIT
            ELAPSED=$((ELAPSED + POLL_WAIT))
          done

          if [ "$VULN_COUNT" -eq 0 ] 2>/dev/null || [ -z "$VULN_COUNT" ]; then
            echo ""
            echo "⚠️  Nenhuma vulnerabilidade HIGH/CRITICAL detectada após ${MAX_POLL}s"
            echo "   O AppSec pode precisar de mais tempo ou o OneAgent não instrumentou a app."
            echo "   Prosseguindo para validação SRG mesmo assim..."
            echo "0" > /tmp/detected_vuln_count.txt
          fi

      # ── ④ Disparar validação SRG ─────────────────────────────────────────
      - name: Disparar validação SRG
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
          DT_WORKFLOW_ID:   ${{ secrets.DT_WORKFLOW_ID }}
          BUILD_VERSION:    ${{ needs.build.outputs.version }}
          GIT_COMMIT:       ${{ github.sha }}
        run: |
          chmod +x ./scripts/trigger_validation.sh
          echo "🚀 Disparando Site Reliability Guardian validation..."
          ./scripts/trigger_validation.sh

      # ── ⑤ Aguardar resultado SRG ─────────────────────────────────────────
      - name: Aguardar e verificar resultado SRG
        # ⚠️  Exit 1 se o Guardian encontrar vulnerabilidades → pipeline BLOQUEADA
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
          DT_TENANT_URL:    https://fov31014.apps.dynatrace.com
          DT_WORKFLOW_ID:   ${{ secrets.DT_WORKFLOW_ID }}
          MAX_WAIT_TIME:    300
          POLL_INTERVAL:    15
        run: |
          chmod +x ./scripts/check_validation.sh
          ./scripts/check_validation.sh

      # ── ⑥ Parar stack (sempre, mesmo em falha) ──────────────────────────
      - name: Parar aplicação
        if: always()
        run: |
          if [ -f /tmp/app_pid.txt ]; then
            APP_PID=$(cat /tmp/app_pid.txt)
            kill $APP_PID 2>/dev/null || true
            echo "✅ App Node.js parada (PID: $APP_PID)"
          fi
          docker rm -f srg-mysql 2>/dev/null || true
          echo "✅ MySQL parado"

      # ── Sumário ──────────────────────────────────────────────────────────
      - name: Pipeline APROVADA pelo SRG
        if: success()
        env:
          DT_TENANT_URL: https://fov31014.apps.dynatrace.com
        run: |
          echo ""
          echo "✅ DEPLOY APROVADO — nenhuma vulnerabilidade bloqueante encontrada"
          echo "📊 Dashboard: ${DT_TENANT_URL}/ui/apps/dynatrace.site.reliability.guardian"
          if [ -f /tmp/dynatrace_validation_url.txt ]; then
            echo "🔗 Validação: $(cat /tmp/dynatrace_validation_url.txt)"
          fi

      - name: Pipeline BLOQUEADA pelo SRG
        if: failure()
        env:
          DT_TENANT_URL: https://fov31014.apps.dynatrace.com
        run: |
          echo ""
          echo "❌ DEPLOY BLOQUEADO PELO SRG"
          echo "⚠️  Dynatrace Site Reliability Guardian detectou vulnerabilidades!"
          echo ""
          echo "📊 Dashboard: ${DT_TENANT_URL}/ui/apps/dynatrace.site.reliability.guardian"
          if [ -f /tmp/dynatrace_validation_url.txt ]; then
            echo "🔗 Validação: $(cat /tmp/dynatrace_validation_url.txt)"
          fi
          echo ""
          echo "🔍 Revisar: ${DT_TENANT_URL}/ui/apps/dynatrace.classic.security.overview"
          echo "🛠  Correção: atualize os pacotes em app/package.json e faça novo push"

