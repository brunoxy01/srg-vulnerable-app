name: Build, Deploy & SRG Security Gate

# ──────────────────────────────────────────────────────────────────────────────
# Arquitetura — 100% cloud, sem servidor fixo, sem self-hosted runner:
#
#   [ubuntu-latest]          [ubuntu-latest]              [Dynatrace]
#   job: build ──────────►  job: security-gate  ────────► SRG Guardian
#   (build + push GHCR)      ① instala OneAgent             avalia CVEs
#                            ② docker compose up            → bloqueia se
#                            ③ aguarda AppSec (~8min)         vulnerável
#                            ④ dispara SRG workflow
#                            ⑤ lê resultado → exit 1 = BLOQUEADO
#                            ⑥ docker compose down
#
# O runner ubuntu-latest é uma VM Linux completa — o OneAgent é instalado
# nela durante o pipeline, monitora o processo Node.js em tempo real e o
# Application Security detecta os CVEs dos pacotes vulneráveis.
#
# Secrets necessários (apenas 5 — sem SSH, sem servidor fixo):
#   DOCKER_USERNAME     seu username do GitHub (ex: brunoxy01)
#   DOCKER_PASSWORD     GitHub PAT com escopo write:packages
#   DT_API_TOKEN        token clássico Dynatrace com escopo InstallerDownload
#   DT_CLIENT_ID        OAuth2 client ID do Dynatrace
#   DT_CLIENT_SECRET    OAuth2 client secret do Dynatrace
#   DT_WORKFLOW_ID      ID do Workflow criado por setup_dynatrace.sh
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY:      ghcr.io
  IMAGE_NAME:    ghcr.io/brunoxy01/srg-vulnerable-app
  DT_TENANT_URL: https://fov31014.apps.dynatrace.com

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build & Push ───────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      version:   ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── 2. Rodar app + OneAgent + SRG Gate (tudo no ubuntu-latest) ───────────
  #
  # O runner ubuntu-latest é uma VM Linux completa.
  # Instalamos o Dynatrace OneAgent nela, subimos o app via docker compose,
  # aguardamos o Application Security detectar os CVEs (~8 min) e disparamos
  # a validação SRG. Sem servidor fixo, sem SSH, sem self-hosted runner.
  security-gate:
    name: Deploy, Scan & SRG Gate
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    env:
      DT_TENANT_URL: https://fov31014.apps.dynatrace.com
      APP_VERSION:   ${{ needs.build.outputs.version }}
      BUILD_NUMBER:  ${{ github.run_number }}
      GIT_COMMIT:    ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── ① Instalar Dynatrace OneAgent no runner ───────────────────────────
      # Requer DT_API_TOKEN: token clássico com escopo "InstallerDownload"
      # Como criar: Dynatrace → Access tokens → Generate new token → InstallerDownload
      - name: Instalar Dynatrace OneAgent
        env:
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
        run: |
          echo "⬇️  Baixando OneAgent installer..."
          wget -q -O /tmp/Dynatrace-OneAgent.sh \
            "${DT_TENANT_URL}/api/v1/deployment/installer/agent/unix/default/latest?Api-Token=${DT_API_TOKEN}&arch=x86&flavor=default"

          echo "📦 Instalando OneAgent..."
          sudo /bin/sh /tmp/Dynatrace-OneAgent.sh \
            --set-infra-only=false \
            --set-app-log-content-access=true \
            --set-host-group=github-actions-runner

          echo "✅ OneAgent instalado"
          sudo systemctl status dynatrace-oneagent --no-pager || true

      # ── ② Subir a aplicação vulnerável ────────────────────────────────────
      - name: Subir aplicação vulnerável (docker compose)
        run: |
          export APP_VERSION="${APP_VERSION}"
          export BUILD_NUMBER="${BUILD_NUMBER}"
          docker compose pull
          docker compose up -d
          echo "✅ Stack iniciada"
          docker compose ps

      - name: Aguardar health check
        run: |
          echo "⏳ Aguardando aplicação responder em /health ..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health; then
              echo ""
              echo "✅ Aplicação saudável"
              exit 0
            fi
            echo "   Tentativa $i/20 — aguardando 5s..."
            sleep 5
          done
          echo "❌ Aplicação não ficou saudável a tempo"
          exit 1

      # ── ③ Aguardar OneAgent + AppSec detectarem os CVEs ──────────────────
      # O OneAgent escaneia o processo Node.js e identifica os pacotes
      # vulneráveis (node-serialize, ejs, lodash, axios, jsonwebtoken).
      # Isso leva alguns minutos após o processo iniciar.
      - name: Aguardar AppSec detectar vulnerabilidades (~8 min)
        run: |
          echo "⏳ Aguardando Dynatrace Application Security escanear o processo Node.js..."
          echo "   Pacotes monitorados: node-serialize (CVE-2017-5941), ejs (CVE-2022-29078),"
          echo "   lodash (CVE-2020-8203), axios (CVE-2021-3749), jsonwebtoken (CVE-2022-23529)"
          echo ""
          echo "   Janela de espera: 8 minutos"
          sleep 480
          echo "✅ Janela de análise concluída"

      # ── ④ Enviar evento de deployment ao Dynatrace ────────────────────────
      - name: Enviar deployment event ao Dynatrace
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
        run: |
          TOKEN=$(curl -s -X POST "https://sso.dynatrace.com/sso/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${DT_CLIENT_ID}&client_secret=${DT_CLIENT_SECRET}&scope=openpipeline:events:ingest" \
            | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

          if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
            curl -s -X POST "${DT_TENANT_URL}/platform/ingest/v1/events" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"eventType\": \"CUSTOM_DEPLOYMENT\",
                \"title\": \"Deploy srg-vulnerable-app v${APP_VERSION}\",
                \"properties\": {
                  \"dt.event.deployment.name\":    \"srg-vulnerable-app\",
                  \"dt.event.deployment.version\": \"${APP_VERSION}\",
                  \"git.commit\": \"${GIT_COMMIT}\",
                  \"ci.pipeline\": \"${GITHUB_RUN_ID}\"
                }
              }" && echo "✅ Deployment event enviado" || echo "⚠️  Evento não enviado"
          else
            echo "⚠️  Token não obtido — evento de deployment pulado"
          fi

      # ── ⑤ Disparar e verificar validação SRG ─────────────────────────────
      - name: Disparar validação SRG
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
          DT_WORKFLOW_ID:   ${{ secrets.DT_WORKFLOW_ID }}
          BUILD_VERSION:    ${{ needs.build.outputs.version }}
          GIT_COMMIT:       ${{ github.sha }}
        run: |
          chmod +x ./scripts/trigger_validation.sh
          echo "🚀 Disparando Site Reliability Guardian validation..."
          ./scripts/trigger_validation.sh

      - name: Aguardar e verificar resultado SRG
        # ⚠️  Exit 1 se o Guardian encontrar vulnerabilidades → pipeline BLOQUEADA
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
          DT_TENANT_URL:    https://fov31014.apps.dynatrace.com
          MAX_WAIT_TIME:    300
          POLL_INTERVAL:    15
        run: |
          chmod +x ./scripts/check_validation.sh
          ./scripts/check_validation.sh

      # ── ⑥ Parar a stack (sempre, mesmo em falha) ─────────────────────────
      - name: Parar aplicação
        if: always()
        run: docker compose down --volumes

      # ── Sumário ──────────────────────────────────────────────────────────
      - name: Pipeline APROVADA pelo SRG
        if: success()
        run: |
          echo ""
          echo "✅ DEPLOY APROVADO — nenhuma vulnerabilidade bloqueante encontrada"
          echo "📊 Dashboard: ${DT_TENANT_URL}/ui/apps/dynatrace.site.reliability.guardian"

      - name: Pipeline BLOQUEADA pelo SRG
        if: failure()
        run: |
          echo ""
          echo "❌ DEPLOY BLOQUEADO PELO SRG"
          echo "⚠️  Dynatrace Application Security detectou vulnerabilidades críticas!"
          echo ""
          echo "🔍 Revisar: ${DT_TENANT_URL}/ui/apps/dynatrace.classic.security.overview"
          echo "🛠  Correção: atualize os pacotes em app/package.json e faça novo push"

