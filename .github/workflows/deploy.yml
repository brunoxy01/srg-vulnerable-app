name: Build, Deploy & SRG Security Gate

# ──────────────────────────────────────────────────────────────────────────────
# Pipeline flow:
#  1. build    → Build Docker image, push to GHCR
#  2. deploy   → SSH to server, docker compose up (with new image)
#  3. security → Trigger Dynatrace SRG Guardian validation
#                Block the deploy if critical/high vulnerabilities are found
#
# Required GitHub Secrets:
#   DOCKER_USERNAME     GHCR username (your GitHub username)
#   DOCKER_PASSWORD     GHCR token (GitHub PAT with write:packages scope)
#   DEPLOY_HOST         SSH hostname / IP of your deploy server
#   DEPLOY_USER         SSH user on the deploy server
#   DEPLOY_SSH_KEY      Private SSH key (paste the full PEM content)
#   DT_CLIENT_ID        Dynatrace OAuth2 client ID
#   DT_CLIENT_SECRET    Dynatrace OAuth2 client secret
#   DT_WORKFLOW_ID      Dynatrace Automation Workflow ID (from setup_dynatrace.sh)
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY:    ghcr.io
  IMAGE_NAME:  ghcr.io/brunoxy01/srg-vulnerable-app
  DT_TENANT_URL: https://fov31014.apps.dynatrace.com

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build & Push ─────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      version:   ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── 2. Deploy via SSH + Docker Compose ──────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy with Docker Compose
        env:
          IMAGE_TAG:  ${{ needs.build.outputs.image-tag }}
          APP_VERSION: ${{ needs.build.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "
                set -e
                cd ~/srg-vulnerable-app || (git clone https://github.com/brunoxy01/srg-vulnerable-app.git ~/srg-vulnerable-app && cd ~/srg-vulnerable-app)
                git pull origin main
                export APP_VERSION='${{ needs.build.outputs.version }}'
                export BUILD_NUMBER='${{ github.run_number }}'
                docker compose pull
                docker compose up -d --remove-orphans
                echo '✅ Deployed successfully'
                docker compose ps
              "

      - name: Wait for application health
        run: |
          echo "⏳ Waiting for app to be healthy..."
          DEPLOY_HOST="${{ secrets.DEPLOY_HOST }}"
          for i in $(seq 1 24); do
            if ssh -o StrictHostKeyChecking=no \
                   "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
                   "curl -sf http://localhost:3000/health"; then
              echo "✅ Application is healthy"
              exit 0
            fi
            echo "   Attempt $i/24 — waiting 5s..."
            sleep 5
          done
          echo "❌ Application did not become healthy in time"
          exit 1

  # ── 3. SRG Security Gate ────────────────────────────────────────────────────
  security-gate:
    name: SRG Security Validation
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    env:
      DT_TENANT_URL:   https://fov31014.apps.dynatrace.com
      SERVICE_NAME:    srg-vulnerable-app
      BUILD_VERSION:   ${{ needs.build.outputs.version }}
      GIT_COMMIT:      ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send deployment event to Dynatrace
        # This enriches the SRG evaluation window with deployment context
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
        run: |
          # Get token
          TOKEN=$(curl -s -X POST "https://sso.dynatrace.com/sso/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${DT_CLIENT_ID}&client_secret=${DT_CLIENT_SECRET}&scope=openpipeline:events:ingest" \
            | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

          # Ingest deployment event
          curl -s -X POST "${DT_TENANT_URL}/platform/ingest/v1/events" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "eventType": "CUSTOM_DEPLOYMENT",
              "title": "Deployment: srg-vulnerable-app v${{ needs.build.outputs.version }}",
              "entitySelector": "type(SERVICE),tag(srg-vulnerable-app)",
              "properties": {
                "dt.event.deployment.name":    "srg-vulnerable-app",
                "dt.event.deployment.version": "${{ needs.build.outputs.version }}",
                "git.commit":                  "${{ github.sha }}",
                "ci.pipeline":                 "${{ github.run_id }}"
              }
            }' || echo "⚠️  Deployment event ingestion skipped (token scope may not include events)"

      - name: Trigger Dynatrace SRG validation
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
          DT_WORKFLOW_ID:   ${{ secrets.DT_WORKFLOW_ID }}
          BUILD_VERSION:    ${{ needs.build.outputs.version }}
          GIT_COMMIT:       ${{ github.sha }}
        run: |
          chmod +x ./scripts/trigger_validation.sh
          echo "🚀 Triggering Site Reliability Guardian validation..."
          ./scripts/trigger_validation.sh

      - name: Wait and check SRG result
        # ⚠️  This step fails (exit 1) if the Guardian detects vulnerabilities.
        # The pipeline will be marked as FAILED, blocking the deployment.
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
          DT_TENANT_URL:    https://fov31014.apps.dynatrace.com
          MAX_WAIT_TIME:    300
          POLL_INTERVAL:    15
        run: |
          chmod +x ./scripts/check_validation.sh
          echo ""
          echo "⏳ Polling for Guardian validation result..."
          echo "   Max wait: ${MAX_WAIT_TIME}s  |  Interval: ${POLL_INTERVAL}s"
          echo ""
          ./scripts/check_validation.sh

      - name: Pipeline passed
        if: success()
        run: |
          echo ""
          echo "✅ DEPLOYMENT SUCCEEDED"
          echo "✅ SRG Guardian found no blocking vulnerabilities"
          echo "📊 ${DT_TENANT_URL}/ui/apps/dynatrace.site.reliability.guardian"

      - name: Pipeline blocked by SRG
        if: failure()
        run: |
          echo ""
          echo "❌ DEPLOYMENT BLOCKED BY SRG"
          echo "⚠️  Critical or High vulnerabilities detected by Dynatrace Application Security"
          echo "🔍 Review: ${DT_TENANT_URL}/ui/apps/dynatrace.classic.security.overview"
          echo ""
          echo "To fix: upgrade vulnerable packages in app/package.json and re-push"
