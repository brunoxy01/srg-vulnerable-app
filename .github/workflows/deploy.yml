name: Build, Deploy & SRG Security Gate

# ──────────────────────────────────────────────────────────────────────────────
# Arquitetura do pipeline:
#
#   [ubuntu-latest]        [self-hosted runner]         [Dynatrace]
#   build ──────────────► deploy ──────────────────────► security-gate
#   (GHCR push)            (docker compose up           (SRG Guardian valida
#                           na própria máquina)          → bloqueia se vulns)
#
# O job "deploy" roda num SELF-HOSTED RUNNER — a máquina onde o Dynatrace
# OneAgent está instalado. Assim o OneAgent monitora o container em tempo real
# e o Application Security detecta os CVEs. Não é necessário IP fixo,
# SSH externo nem segredo de deploy.
#
# Como configurar o self-hosted runner:
#   GitHub → Settings → Actions → Runners → New self-hosted runner
#   Execute o script gerado na máquina que tem OneAgent + Docker instalados.
#
# Secrets necessários (apenas 4):
#   DOCKER_USERNAME     seu username do GitHub (ex: brunoxy01)
#   DOCKER_PASSWORD     GitHub PAT com escopo write:packages
#   DT_CLIENT_ID        OAuth2 client ID do Dynatrace
#   DT_CLIENT_SECRET    OAuth2 client secret do Dynatrace
#   DT_WORKFLOW_ID      ID do Workflow criado por setup_dynatrace.sh
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY:      ghcr.io
  IMAGE_NAME:    ghcr.io/brunoxy01/srg-vulnerable-app
  DT_TENANT_URL: https://fov31014.apps.dynatrace.com

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build & Push (runner cloud do GitHub) ─────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      version:   ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── 2. Deploy (self-hosted runner — máquina com OneAgent + Docker) ────────
  #
  # Este job roda LOCALMENTE na sua máquina (self-hosted runner).
  # O runner executa docker compose up diretamente — sem SSH, sem IP fixo.
  # O Dynatrace OneAgent instalado no host monitora o container em tempo real.
  deploy:
    name: Deploy via Docker Compose (self-hosted)
    runs-on: [self-hosted, linux]   # ← label do seu runner local
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull nova imagem e reiniciar stack
        env:
          APP_VERSION:   ${{ needs.build.outputs.version }}
          BUILD_NUMBER:  ${{ github.run_number }}
        run: |
          export APP_VERSION="${APP_VERSION}"
          export BUILD_NUMBER="${BUILD_NUMBER}"
          docker compose pull
          docker compose up -d --remove-orphans
          echo "✅ Stack reiniciada"
          docker compose ps

      - name: Aguardar health check da aplicação
        run: |
          echo "⏳ Aguardando a aplicação ficar saudável..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:3000/health; then
              echo "✅ Aplicação saudável!"
              exit 0
            fi
            echo "   Tentativa $i/24 — aguardando 5s..."
            sleep 5
          done
          echo "❌ Aplicação não ficou saudável a tempo"
          exit 1

  # ── 3. SRG Security Gate ────────────────────────────────────────────────────
  security-gate:
    name: SRG Security Validation
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: github.ref == 'refs/heads/main'

    env:
      DT_TENANT_URL:   https://fov31014.apps.dynatrace.com
      SERVICE_NAME:    srg-vulnerable-app
      BUILD_VERSION:   ${{ needs.build.outputs.version }}
      GIT_COMMIT:      ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send deployment event to Dynatrace
        # This enriches the SRG evaluation window with deployment context
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
        run: |
          # Get token
          TOKEN=$(curl -s -X POST "https://sso.dynatrace.com/sso/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${DT_CLIENT_ID}&client_secret=${DT_CLIENT_SECRET}&scope=openpipeline:events:ingest" \
            | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

          # Ingest deployment event
          curl -s -X POST "${DT_TENANT_URL}/platform/ingest/v1/events" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "eventType": "CUSTOM_DEPLOYMENT",
              "title": "Deployment: srg-vulnerable-app v${{ needs.build.outputs.version }}",
              "entitySelector": "type(SERVICE),tag(srg-vulnerable-app)",
              "properties": {
                "dt.event.deployment.name":    "srg-vulnerable-app",
                "dt.event.deployment.version": "${{ needs.build.outputs.version }}",
                "git.commit":                  "${{ github.sha }}",
                "ci.pipeline":                 "${{ github.run_id }}"
              }
            }' || echo "⚠️  Deployment event ingestion skipped (token scope may not include events)"

      - name: Trigger Dynatrace SRG validation
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
          DT_WORKFLOW_ID:   ${{ secrets.DT_WORKFLOW_ID }}
          BUILD_VERSION:    ${{ needs.build.outputs.version }}
          GIT_COMMIT:       ${{ github.sha }}
        run: |
          chmod +x ./scripts/trigger_validation.sh
          echo "🚀 Triggering Site Reliability Guardian validation..."
          ./scripts/trigger_validation.sh

      - name: Wait and check SRG result
        # ⚠️  This step fails (exit 1) if the Guardian detects vulnerabilities.
        # The pipeline will be marked as FAILED, blocking the deployment.
        env:
          DT_CLIENT_ID:     ${{ secrets.DT_CLIENT_ID }}
          DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
          DT_TENANT_URL:    https://fov31014.apps.dynatrace.com
          MAX_WAIT_TIME:    300
          POLL_INTERVAL:    15
        run: |
          chmod +x ./scripts/check_validation.sh
          echo ""
          echo "⏳ Polling for Guardian validation result..."
          echo "   Max wait: ${MAX_WAIT_TIME}s  |  Interval: ${POLL_INTERVAL}s"
          echo ""
          ./scripts/check_validation.sh

      - name: Pipeline passed
        if: success()
        run: |
          echo ""
          echo "✅ DEPLOYMENT SUCCEEDED"
          echo "✅ SRG Guardian found no blocking vulnerabilities"
          echo "📊 ${DT_TENANT_URL}/ui/apps/dynatrace.site.reliability.guardian"

      - name: Pipeline blocked by SRG
        if: failure()
        run: |
          echo ""
          echo "❌ DEPLOYMENT BLOCKED BY SRG"
          echo "⚠️  Critical or High vulnerabilities detected by Dynatrace Application Security"
          echo "🔍 Review: ${DT_TENANT_URL}/ui/apps/dynatrace.classic.security.overview"
          echo ""
          echo "To fix: upgrade vulnerable packages in app/package.json and re-push"
