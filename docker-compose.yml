# ──────────────────────────────────────────────────────────────────────────────
# SRG Vulnerable App — docker-compose.yml
#
# Services:
#   vulnerable-app  →  Node.js app with intentional CVE-laden dependencies
#   mysql           →  Database for the SQL-injection demo
#
# Dynatrace Integration:
#   Install Dynatrace OneAgent on the Docker HOST (not inside the container).
#   OneAgent will auto-discover the containers, monitor them, and
#   Application Security will detect the vulnerable packages at runtime.
#
#   Install OneAgent:
#     https://fov31014.apps.dynatrace.com/ui/hub/ext/dynatrace.linux.oneagent
#
# Quick start:
#   cp .env.example .env   # fill in your values
#   docker compose up -d
#   open http://localhost:3000
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Vulnerable Node.js Application ──────────────────────────────────────────
  vulnerable-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/brunoxy01/srg-vulnerable-app:${APP_VERSION:-latest}
    container_name: srg-vulnerable-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:    production
      PORT:        3000
      DB_HOST:     mysql
      DB_USER:     root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      DB_NAME:     vulndb
      APP_VERSION: ${APP_VERSION:-1.0.0}

      # ── Dynatrace Release Metadata ─────────────────────────────────────────
      # These env-vars are read by the OneAgent installed on the host to
      # enrich the service with release information used by the SRG.
      DT_RELEASE_VERSION:       ${APP_VERSION:-1.0.0}
      DT_RELEASE_PRODUCT:       srg-vulnerable-app
      DT_RELEASE_STAGE:         ${STAGE:-production}
      DT_RELEASE_BUILD_VERSION: ${BUILD_NUMBER:-local}

    labels:
      # Docker labels for Dynatrace auto-tagging
      dt.service.name:    srg-vulnerable-app
      dt.service.release: ${APP_VERSION:-1.0.0}

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - app-network

    restart: unless-stopped

    healthcheck:
      test:         ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval:     30s
      timeout:      5s
      retries:      3
      start_period: 20s

  # ── MySQL (SQL-injection demo database) ────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: srg-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      vulndb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test:         ["CMD", "mysqladmin", "ping", "-h", "localhost",
                     "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 30s

# ── Networks & Volumes ─────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
